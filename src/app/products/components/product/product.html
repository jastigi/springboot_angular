<div class="container my-4">
    <h2>Listado de Productos</h2>

    <div class="row">
        <div class="col">
            <product-form (newProductSubmit)="addProduct($event)" [product]="productSelected"></product-form>
        </div>
        <div class="col">

            @if(products.length > 0){
        
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Price</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    @for(product of products; track product.id){
                    <tr>
                        <td>{{product.name}}</td>
                        <td>{{product.description}}</td>
                        <td>{{product.price}}</td>
                        <td>
                            <button type="button" (click)="onUpdateProduct(product)" class="btn btn-sm btn-secondary">Actualizar</button>
                        </td>
                        <td>
                            <button type="button" (click)="onRemoveProduct(product.id)" class="btn btn-sm btn-danger">Eliminar</button>
                        </td>
                    </tr>
                }
                </tbody>
            </table>

            } @else {

            <div class="alert alert-info">Lo sentimos no hay registros en el sistema!</div>

    }

        </div>
    </div>
</div>
